openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Glam CRM API for makeup artist business management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: bookings
    description: Booking and job management
  - name: payments
    description: Payment tracking
  - name: services
    description: Reusable services and fees
  - name: artist
    description: Artist business profile
  - name: contractTemplates
    description: Reusable contract template management
  - name: dashboard
    description: Dashboard summary data
  - name: notifications
    description: Notification center
  - name: tags
    description: Tag management for clients and bookings
  - name: segments
    description: Saved segments
  - name: portal
    description: Public client portal endpoints
  - name: signatures
    description: Contract signatures
  - name: email
    description: Email templates and composed messages
  - name: automations
    description: Automation settings and scheduled tasks
  - name: paymentLinks
    description: Manual payment-intent links (Zelle/Venmo/CashApp)
  - name: calendar
    description: Calendar view and ICS export
  - name: leads
    description: Lead/inquiry capture and pipeline

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Clients ───────────────────────────────────────────────────────────────

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Services ─────────────────────────────────────────────────────────────

  /services:
    get:
      operationId: listServiceItems
      tags: [services]
      summary: List reusable services and fees
      responses:
        "200":
          description: List of reusable services and fees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceItem"
    post:
      operationId: createServiceItem
      tags: [services]
      summary: Create a reusable service or fee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceItemInput"
      responses:
        "201":
          description: Created service or fee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceItem"

  /services/{id}:
    patch:
      operationId: updateServiceItem
      tags: [services]
      summary: Update a reusable service or fee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceItemUpdate"
      responses:
        "200":
          description: Updated service or fee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceItem"
    delete:
      operationId: deleteServiceItem
      tags: [services]
      summary: Archive a reusable service or fee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Archived

  # ─── Artist Profile ──────────────────────────────────────────────────────

  /artist-profile:
    get:
      operationId: getArtistProfile
      tags: [artist]
      summary: Get the artist business profile
      responses:
        "200":
          description: Artist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistProfile"
    patch:
      operationId: updateArtistProfile
      tags: [artist]
      summary: Update the artist business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtistProfileUpdate"
      responses:
        "200":
          description: Updated artist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistProfile"

  # ─── Contract Templates ──────────────────────────────────────────────────

  /contract-templates:
    get:
      operationId: listContractTemplates
      tags: [contractTemplates]
      summary: List contract templates
      responses:
        "200":
          description: List of contract templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractTemplate"
    post:
      operationId: createContractTemplate
      tags: [contractTemplates]
      summary: Create a contract template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractTemplateInput"
      responses:
        "201":
          description: Created contract template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractTemplate"

  /contract-templates/{id}:
    patch:
      operationId: updateContractTemplate
      tags: [contractTemplates]
      summary: Update a contract template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractTemplateUpdate"
      responses:
        "200":
          description: Updated contract template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractTemplate"
    delete:
      operationId: deleteContractTemplate
      tags: [contractTemplates]
      summary: Archive a contract template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Archived contract template

  # ─── Bookings ──────────────────────────────────────────────────────────────

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      parameters:
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking with events and payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
        "404":
          description: Not found
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    delete:
      operationId: deleteBooking
      tags: [bookings]
      summary: Move a booking to deleted bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookings/{id}/restore:
    post:
      operationId: restoreBooking
      tags: [bookings]
      summary: Restore a deleted booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/permanent:
    delete:
      operationId: permanentlyDeleteBooking
      tags: [bookings]
      summary: Permanently delete a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Permanently deleted

  /bookings/{id}/events:
    post:
      operationId: createEvent
      tags: [bookings]
      summary: Add an event to a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingEvent"

  /bookings/{id}/line-items:
    post:
      operationId: createBookingLineItem
      tags: [bookings]
      summary: Add a selected service or fee to a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingLineItemInput"
      responses:
        "201":
          description: Created booking line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingLineItem"

  /bookings/{id}/line-items/{lineItemId}:
    patch:
      operationId: updateBookingLineItem
      tags: [bookings]
      summary: Update a selected service or fee on a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: lineItemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingLineItemUpdate"
      responses:
        "200":
          description: Updated booking line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingLineItem"
    delete:
      operationId: deleteBookingLineItem
      tags: [bookings]
      summary: Remove a selected service or fee from a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: lineItemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed booking line item

  /bookings/{id}/events/{eventId}:
    patch:
      operationId: updateEvent
      tags: [bookings]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingEvent"
    delete:
      operationId: deleteEvent
      tags: [bookings]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookings/{id}/contract:
    get:
      operationId: getContract
      tags: [bookings]
      summary: Get contract data for a booking (used to render/download PDF)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractData"

  /bookings/{id}/payments:
    post:
      operationId: recordPayment
      tags: [payments]
      summary: Record a payment against a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{paymentId}:
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment record
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Dashboard ─────────────────────────────────────────────────────────────

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Dashboard summary statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [dashboard]
      summary: Upcoming events in the next 90 days
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingEvent"

  /dashboard/recent-bookings:
    get:
      operationId: getRecentBookings
      tags: [dashboard]
      summary: Most recently created bookings
      responses:
        "200":
          description: Recent bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /dashboard/next-actions:
    get:
      operationId: getNextActions
      tags: [dashboard]
      summary: Derived next-actions list
      responses:
        "200":
          description: Next actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NextAction"

  # ─── Notifications ─────────────────────────────────────────────────────────

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "204":
          description: All marked read

  # ─── Tags ──────────────────────────────────────────────────────────────────

  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /tags/{id}:
    delete:
      operationId: deleteTag
      tags: [tags]
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/tags:
    get:
      operationId: listClientTags
      tags: [tags]
      summary: List tags for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: assignClientTag
      tags: [tags]
      summary: Assign a tag to a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagAssignment"
      responses:
        "204":
          description: Assigned

  /clients/{id}/tags/{tagId}:
    delete:
      operationId: removeClientTag
      tags: [tags]
      summary: Remove a tag from a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /bookings/{id}/tags:
    get:
      operationId: listBookingTags
      tags: [tags]
      summary: List tags for a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: assignBookingTag
      tags: [tags]
      summary: Assign a tag to a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagAssignment"
      responses:
        "204":
          description: Assigned

  /bookings/{id}/tags/{tagId}:
    delete:
      operationId: removeBookingTag
      tags: [tags]
      summary: Remove a tag from a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tagId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ─── Saved Segments ────────────────────────────────────────────────────────

  /saved-segments:
    get:
      operationId: listSavedSegments
      tags: [segments]
      summary: List saved segments
      responses:
        "200":
          description: Saved segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedSegment"
    post:
      operationId: createSavedSegment
      tags: [segments]
      summary: Create a saved segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedSegmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedSegment"

  /saved-segments/{id}:
    delete:
      operationId: deleteSavedSegment
      tags: [segments]
      summary: Delete a saved segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Portal share links ────────────────────────────────────────────────────

  /bookings/{id}/share-link:
    get:
      operationId: getBookingShareLink
      tags: [portal]
      summary: Get the share link for a booking (creates one if absent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingShareLink"
    post:
      operationId: rotateBookingShareLink
      tags: [portal]
      summary: Rotate (regenerate) the share link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingShareLink"
    delete:
      operationId: revokeBookingShareLink
      tags: [portal]
      summary: Revoke the share link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked

  # ─── Email templates ───────────────────────────────────────────────────────

  /email-templates:
    get:
      operationId: listEmailTemplates
      tags: [email]
      summary: List email templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailTemplate"
    post:
      operationId: createEmailTemplate
      tags: [email]
      summary: Create an email template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateInput"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"

  /email-templates/{id}:
    patch:
      operationId: updateEmailTemplate
      tags: [email]
      summary: Update an email template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTemplate"
    delete:
      operationId: deleteEmailTemplate
      tags: [email]
      summary: Delete an email template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /email-templates/{id}/render:
    post:
      operationId: renderEmailTemplate
      tags: [email]
      summary: Render a template with booking/client merge fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRenderInput"
      responses:
        "200":
          description: Rendered message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailRendered"

  # ─── Email messages ────────────────────────────────────────────────────────

  /email-messages:
    get:
      operationId: listEmailMessages
      tags: [email]
      summary: List composed/sent email messages
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
        - name: bookingId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailMessage"
    post:
      operationId: createEmailMessage
      tags: [email]
      summary: Create an email message (draft or recorded send)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailMessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessage"

  /email-messages/{id}:
    patch:
      operationId: updateEmailMessage
      tags: [email]
      summary: Update an email message (status or contents)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailMessageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailMessage"
    delete:
      operationId: deleteEmailMessage
      tags: [email]
      summary: Delete an email message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Automation settings + scheduled tasks ─────────────────────────────────

  /automation-settings:
    get:
      operationId: getAutomationSettings
      tags: [automations]
      summary: Get automation settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationSettings"
    patch:
      operationId: updateAutomationSettings
      tags: [automations]
      summary: Update automation settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationSettings"

  /automations/run:
    post:
      operationId: runAutomations
      tags: [automations]
      summary: Run the reminder pass now (claims due scheduled tasks)
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRunResult"

  /scheduled-tasks:
    get:
      operationId: listScheduledTasks
      tags: [automations]
      summary: List scheduled tasks
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledTask"

  # ─── Payment intents ───────────────────────────────────────────────────────

  /bookings/{id}/payment-intents:
    get:
      operationId: listBookingPaymentIntents
      tags: [paymentLinks]
      summary: List payment intents for a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment intents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentIntent"
    post:
      operationId: createPaymentIntent
      tags: [paymentLinks]
      summary: Create a payment intent (link request)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentIntentInput"
      responses:
        "201":
          description: Created intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntent"

  /payment-intents/{id}:
    patch:
      operationId: updatePaymentIntent
      tags: [paymentLinks]
      summary: Update payment intent (mark paid / cancel)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentIntentUpdate"
      responses:
        "200":
          description: Updated payment intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntent"

  # ─── Calendar ─────────────────────────────────────────────────────────────

  /calendar/events:
    get:
      operationId: listCalendarEvents
      tags: [calendar]
      summary: List events in a date range for the calendar view
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: string
          description: ISO date (inclusive)
        - name: end
          in: query
          required: false
          schema:
            type: string
          description: ISO date (inclusive)
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

  /calendar/feed-token:
    get:
      operationId: getCalendarFeedToken
      tags: [calendar]
      summary: Get the calendar feed token (creates one if absent)
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarFeedTokenInfo"
    post:
      operationId: rotateCalendarFeedToken
      tags: [calendar]
      summary: Rotate the calendar feed token
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarFeedTokenInfo"

  # ─── Leads (admin) ────────────────────────────────────────────────────────

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads
      responses:
        "200":
          description: Leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead (status, conversion ids)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}/convert:
    post:
      operationId: convertLead
      tags: [leads]
      summary: Convert a lead to a client (and optionally a booking)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Converted lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadConversionResult"

  # ─── Public portal/inquire ─────────────────────────────────────────────────

  /public/portal/{token}:
    get:
      operationId: getPortalBooking
      tags: [portal]
      summary: Public booking portal (token-gated)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Portal payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalPayload"
        "404":
          description: Token not found

  /public/portal/{token}/sign:
    post:
      operationId: signPortalContract
      tags: [signatures]
      summary: Capture a typed signature for the contract
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortalSignatureInput"
      responses:
        "200":
          description: Signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalPayload"

  /public/leads:
    post:
      operationId: createPublicLead
      tags: [leads]
      summary: Submit a public lead/inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicLeadInput"
      responses:
        "201":
          description: Lead received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicLeadAck"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Client ──────────────────────────────────────────────────────────────

    Client:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        phone:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # ── Services ────────────────────────────────────────────────────────────

    ServiceItem:
      type: object
      required: [id, name, kind, defaultUnitPrice, unitLabel, active, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        kind:
          type: string
          enum: [service, fee]
        defaultUnitPrice:
          type: number
        unitLabel:
          type: string
          description: "e.g. person, event, booking, hour"
        active:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string

    ServiceItemInput:
      type: object
      required: [name, kind, defaultUnitPrice, unitLabel]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        kind:
          type: string
          enum: [service, fee]
        defaultUnitPrice:
          type: number
        unitLabel:
          type: string
          minLength: 1
        active:
          type: boolean
        sortOrder:
          type: integer

    ServiceItemUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        kind:
          type: string
          enum: [service, fee]
        defaultUnitPrice:
          type: number
        unitLabel:
          type: string
        active:
          type: boolean
        sortOrder:
          type: integer

    # ── Artist Profile ─────────────────────────────────────────────────────

    ArtistProfile:
      type: object
      required: [id, businessName, displayName, createdAt, updatedAt]
      properties:
        id:
          type: integer
        businessName:
          type: string
        displayName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        zelleHandle:
          type: ["string", "null"]
        venmoHandle:
          type: ["string", "null"]
        cashAppHandle:
          type: ["string", "null"]
        paymentInstructions:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ArtistProfileUpdate:
      type: object
      properties:
        businessName:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        zelleHandle:
          type: ["string", "null"]
        venmoHandle:
          type: ["string", "null"]
        cashAppHandle:
          type: ["string", "null"]
        paymentInstructions:
          type: ["string", "null"]

    # ── Contract Templates ─────────────────────────────────────────────────

    ContractTemplate:
      type: object
      required: [id, name, body, active, isDefault, locked, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        body:
          type: string
        active:
          type: boolean
        isDefault:
          type: boolean
        locked:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    ContractTemplateInput:
      type: object
      required: [name, body]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        body:
          type: string
          minLength: 1
        active:
          type: boolean
        isDefault:
          type: boolean

    ContractTemplateUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        body:
          type: string
          minLength: 1
        active:
          type: boolean
        isDefault:
          type: boolean

    # ── Booking ─────────────────────────────────────────────────────────────

    Booking:
      type: object
      required: [id, clientId, clientName, eventType, location, status, grandTotal, retainerAmount, retainerPaid, balancePaid, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        contractTemplateId:
          type: ["integer", "null"]
        clientName:
          type: string
        eventType:
          type: string
          description: "e.g. Wedding, Birthday, Prom"
        location:
          type: string
        locationDetail:
          type: ["string", "null"]
        firstServiceDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        grandTotal:
          type: number
        retainerAmount:
          type: number
        retainerPaid:
          type: boolean
        balancePaid:
          type: boolean
        balanceDueDate:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: ["string", "null"]
        lifecycleStage:
          type: ["string", "null"]
          description: lead | trial_scheduled | trial_complete | contract_sent | signed | active | completed
        signedAt:
          type: ["string", "null"]
        signedByName:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    BookingInput:
      type: object
      required: [clientId, eventType, location]
      properties:
        clientId:
          type: integer
        contractTemplateId:
          type: integer
        eventType:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        locationDetail:
          type: string
        firstServiceDate:
          type: string
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        retainerAmount:
          type: number
        balanceDueDate:
          type: string
        paymentMethod:
          type: string
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: string
        lifecycleStage:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/BookingLineItemInput"

    BookingUpdate:
      type: object
      properties:
        contractTemplateId:
          type: ["integer", "null"]
        eventType:
          type: string
        location:
          type: string
        locationDetail:
          type: ["string", "null"]
        firstServiceDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        retainerAmount:
          type: number
        retainerPaid:
          type: boolean
        balancePaid:
          type: boolean
        balanceDueDate:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: ["string", "null"]
        lifecycleStage:
          type: string
        signedAt:
          type: ["string", "null"]
        signedByName:
          type: ["string", "null"]

    BookingDetail:
      type: object
      required: [id, clientId, clientName, eventType, location, status, grandTotal, retainerAmount, retainerPaid, balancePaid, createdAt, events, payments, lineItems, activity]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        contractTemplateId:
          type: ["integer", "null"]
        clientName:
          type: string
        clientEmail:
          type: ["string", "null"]
        clientPhone:
          type: ["string", "null"]
        eventType:
          type: string
        location:
          type: string
        locationDetail:
          type: ["string", "null"]
        firstServiceDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        grandTotal:
          type: number
        retainerAmount:
          type: number
        retainerPaid:
          type: boolean
        balancePaid:
          type: boolean
        balanceDueDate:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: ["string", "null"]
        lifecycleStage:
          type: ["string", "null"]
        signedAt:
          type: ["string", "null"]
        signedByName:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/BookingEvent"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/BookingLineItem"
        activity:
          type: array
          items:
            $ref: "#/components/schemas/BookingActivity"

    BookingActivity:
      type: object
      required: [id, bookingId, action, title, description, createdAt]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        action:
          type: string
        title:
          type: string
        description:
          type: string
        metadata:
          type: ["string", "null"]
        createdAt:
          type: string

    # ── Event ───────────────────────────────────────────────────────────────

    BookingLineItem:
      type: object
      required: [id, bookingId, name, kind, quantity, unitPrice, unitLabel, sortOrder, total]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        eventId:
          type: ["integer", "null"]
        serviceItemId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        kind:
          type: string
          enum: [service, fee]
        quantity:
          type: number
        unitPrice:
          type: number
        unitLabel:
          type: string
        calculationNote:
          type: ["string", "null"]
        sortOrder:
          type: integer
        total:
          type: number

    BookingLineItemInput:
      type: object
      required: [name, kind, quantity, unitPrice, unitLabel]
      properties:
        serviceItemId:
          type: integer
        eventId:
          type: integer
        name:
          type: string
          minLength: 1
        description:
          type: string
        kind:
          type: string
          enum: [service, fee]
        quantity:
          type: number
        unitPrice:
          type: number
        unitLabel:
          type: string
          minLength: 1
        calculationNote:
          type: string
        sortOrder:
          type: integer

    BookingLineItemUpdate:
      type: object
      properties:
        serviceItemId:
          type: ["integer", "null"]
        eventId:
          type: ["integer", "null"]
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        kind:
          type: string
          enum: [service, fee]
        quantity:
          type: number
        unitPrice:
          type: number
        unitLabel:
          type: string
          minLength: 1
        calculationNote:
          type: ["string", "null"]
        sortOrder:
          type: integer

    BookingEvent:
      type: object
      required: [id, bookingId, eventName, eventDate, servicesBegin, completionTarget, sortOrder, subtotal]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        eventName:
          type: string
          description: "e.g. Sangeet, Wedding Ceremony, Reception"
        eventDate:
          type: string
        servicesBegin:
          type: ["string", "null"]
        completionTarget:
          type: ["string", "null"]
        sortOrder:
          type: integer
        hairAndMakeupCount:
          type: integer
        hairOnlyCount:
          type: integer
        makeupOnlyCount:
          type: integer
        makeupRate:
          type: number
        hairRate:
          type: number
        hairAndMakeupRate:
          type: number
        subtotal:
          type: number
        kind:
          type: string
          enum: [event, trial]

    EventInput:
      type: object
      required: [eventName, eventDate]
      properties:
        eventName:
          type: string
          minLength: 1
        eventDate:
          type: string
        servicesBegin:
          type: string
        completionTarget:
          type: string
        sortOrder:
          type: integer
        hairAndMakeupCount:
          type: integer
        hairOnlyCount:
          type: integer
        makeupOnlyCount:
          type: integer
        makeupRate:
          type: number
        hairRate:
          type: number
        hairAndMakeupRate:
          type: number
        kind:
          type: string
          enum: [event, trial]

    EventUpdate:
      type: object
      properties:
        eventName:
          type: string
        eventDate:
          type: string
        servicesBegin:
          type: ["string", "null"]
        completionTarget:
          type: ["string", "null"]
        sortOrder:
          type: integer
        hairAndMakeupCount:
          type: integer
        hairOnlyCount:
          type: integer
        makeupOnlyCount:
          type: integer
        makeupRate:
          type: number
        hairRate:
          type: number
        hairAndMakeupRate:
          type: number
        kind:
          type: string
          enum: [event, trial]

    # ── Payment ─────────────────────────────────────────────────────────────

    Payment:
      type: object
      required: [id, bookingId, amount, type, paidAt]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        amount:
          type: number
        type:
          type: string
          enum: [retainer, balance, partial, other]
        note:
          type: ["string", "null"]
        paidAt:
          type: string

    PaymentInput:
      type: object
      required: [amount, type]
      properties:
        amount:
          type: number
        type:
          type: string
          enum: [retainer, balance, partial, other]
        note:
          type: string
        paidAt:
          type: string

    # ── Contract ────────────────────────────────────────────────────────────

    ContractData:
      type: object
      required: [booking, client, events]
      properties:
        booking:
          $ref: "#/components/schemas/BookingDetail"
        client:
          $ref: "#/components/schemas/Client"
        events:
          type: array
          items:
            $ref: "#/components/schemas/BookingEvent"
        contractTemplate:
          $ref: "#/components/schemas/ContractTemplate"
        artistName:
          type: string
        artistBusinessName:
          type: ["string", "null"]
        artistEmail:
          type: ["string", "null"]
        artistPhone:
          type: ["string", "null"]
        artistPaymentMethod:
          type: ["string", "null"]

    # ── Dashboard ───────────────────────────────────────────────────────────

    DashboardStats:
      type: object
      required: [totalClients, activeBookings, completedBookings, totalRevenue, pendingRevenue, retainersPending, balancesPending]
      properties:
        totalClients:
          type: integer
        activeBookings:
          type: integer
        completedBookings:
          type: integer
        totalRevenue:
          type: number
          description: Sum of grandTotal for completed bookings
