openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Glam CRM API for makeup artist business management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: bookings
    description: Booking and job management
  - name: payments
    description: Payment tracking
  - name: services
    description: Reusable services and fees
  - name: artist
    description: Artist business profile
  - name: contractTemplates
    description: Reusable contract template management
  - name: dashboard
    description: Dashboard summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Clients ───────────────────────────────────────────────────────────────

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Services ─────────────────────────────────────────────────────────────

  /services:
    get:
      operationId: listServiceItems
      tags: [services]
      summary: List reusable services and fees
      responses:
        "200":
          description: List of reusable services and fees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceItem"
    post:
      operationId: createServiceItem
      tags: [services]
      summary: Create a reusable service or fee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceItemInput"
      responses:
        "201":
          description: Created service or fee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceItem"

  /services/{id}:
    patch:
      operationId: updateServiceItem
      tags: [services]
      summary: Update a reusable service or fee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceItemUpdate"
      responses:
        "200":
          description: Updated service or fee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceItem"
    delete:
      operationId: deleteServiceItem
      tags: [services]
      summary: Archive a reusable service or fee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Archived

  # ─── Artist Profile ──────────────────────────────────────────────────────

  /artist-profile:
    get:
      operationId: getArtistProfile
      tags: [artist]
      summary: Get the artist business profile
      responses:
        "200":
          description: Artist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistProfile"
    patch:
      operationId: updateArtistProfile
      tags: [artist]
      summary: Update the artist business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtistProfileUpdate"
      responses:
        "200":
          description: Updated artist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistProfile"

  # ─── Contract Templates ──────────────────────────────────────────────────

  /contract-templates:
    get:
      operationId: listContractTemplates
      tags: [contractTemplates]
      summary: List contract templates
      responses:
        "200":
          description: List of contract templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractTemplate"
    post:
      operationId: createContractTemplate
      tags: [contractTemplates]
      summary: Create a contract template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractTemplateInput"
      responses:
        "201":
          description: Created contract template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractTemplate"

  /contract-templates/{id}:
    patch:
      operationId: updateContractTemplate
      tags: [contractTemplates]
      summary: Update a contract template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractTemplateUpdate"
      responses:
        "200":
          description: Updated contract template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractTemplate"
    delete:
      operationId: deleteContractTemplate
      tags: [contractTemplates]
      summary: Archive a contract template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Archived contract template

  # ─── Bookings ──────────────────────────────────────────────────────────────

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      parameters:
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking with events and payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDetail"
        "404":
          description: Not found
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    delete:
      operationId: deleteBooking
      tags: [bookings]
      summary: Move a booking to deleted bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookings/{id}/restore:
    post:
      operationId: restoreBooking
      tags: [bookings]
      summary: Restore a deleted booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/permanent:
    delete:
      operationId: permanentlyDeleteBooking
      tags: [bookings]
      summary: Permanently delete a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Permanently deleted

  /bookings/{id}/events:
    post:
      operationId: createEvent
      tags: [bookings]
      summary: Add an event to a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingEvent"

  /bookings/{id}/line-items:
    post:
      operationId: createBookingLineItem
      tags: [bookings]
      summary: Add a selected service or fee to a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingLineItemInput"
      responses:
        "201":
          description: Created booking line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingLineItem"

  /bookings/{id}/line-items/{lineItemId}:
    patch:
      operationId: updateBookingLineItem
      tags: [bookings]
      summary: Update a selected service or fee on a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: lineItemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingLineItemUpdate"
      responses:
        "200":
          description: Updated booking line item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingLineItem"
    delete:
      operationId: deleteBookingLineItem
      tags: [bookings]
      summary: Remove a selected service or fee from a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: lineItemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed booking line item

  /bookings/{id}/events/{eventId}:
    patch:
      operationId: updateEvent
      tags: [bookings]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingEvent"
    delete:
      operationId: deleteEvent
      tags: [bookings]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bookings/{id}/contract:
    get:
      operationId: getContract
      tags: [bookings]
      summary: Get contract data for a booking (used to render/download PDF)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractData"

  /bookings/{id}/payments:
    post:
      operationId: recordPayment
      tags: [payments]
      summary: Record a payment against a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{paymentId}:
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment record
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Dashboard ─────────────────────────────────────────────────────────────

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Dashboard summary statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [dashboard]
      summary: Upcoming events in the next 90 days
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingEvent"

  /dashboard/recent-bookings:
    get:
      operationId: getRecentBookings
      tags: [dashboard]
      summary: Most recently created bookings
      responses:
        "200":
          description: Recent bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Client ──────────────────────────────────────────────────────────────

    Client:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        phone:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # ── Services ────────────────────────────────────────────────────────────

    ServiceItem:
      type: object
      required: [id, name, kind, defaultUnitPrice, unitLabel, active, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        kind:
          type: string
          enum: [service, fee]
        defaultUnitPrice:
          type: number
        unitLabel:
          type: string
          description: "e.g. person, event, booking, hour"
        active:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string

    ServiceItemInput:
      type: object
      required: [name, kind, defaultUnitPrice, unitLabel]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        kind:
          type: string
          enum: [service, fee]
        defaultUnitPrice:
          type: number
        unitLabel:
          type: string
          minLength: 1
        active:
          type: boolean
        sortOrder:
          type: integer

    ServiceItemUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        kind:
          type: string
          enum: [service, fee]
        defaultUnitPrice:
          type: number
        unitLabel:
          type: string
        active:
          type: boolean
        sortOrder:
          type: integer

    # ── Artist Profile ─────────────────────────────────────────────────────

    ArtistProfile:
      type: object
      required: [id, businessName, displayName, createdAt, updatedAt]
      properties:
        id:
          type: integer
        businessName:
          type: string
        displayName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ArtistProfileUpdate:
      type: object
      properties:
        businessName:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # ── Contract Templates ─────────────────────────────────────────────────

    ContractTemplate:
      type: object
      required: [id, name, body, active, isDefault, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        body:
          type: string
        active:
          type: boolean
        isDefault:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    ContractTemplateInput:
      type: object
      required: [name, body]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        body:
          type: string
          minLength: 1
        active:
          type: boolean
        isDefault:
          type: boolean

    ContractTemplateUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        body:
          type: string
          minLength: 1
        active:
          type: boolean
        isDefault:
          type: boolean

    # ── Booking ─────────────────────────────────────────────────────────────

    Booking:
      type: object
      required: [id, clientId, clientName, eventType, location, status, grandTotal, retainerAmount, retainerPaid, balancePaid, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        eventType:
          type: string
          description: "e.g. Wedding, Birthday, Prom"
        location:
          type: string
        locationDetail:
          type: ["string", "null"]
        firstServiceDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        grandTotal:
          type: number
        retainerAmount:
          type: number
        retainerPaid:
          type: boolean
        balancePaid:
          type: boolean
        balanceDueDate:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    BookingInput:
      type: object
      required: [clientId, eventType, location]
      properties:
        clientId:
          type: integer
        eventType:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        locationDetail:
          type: string
        firstServiceDate:
          type: string
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        retainerAmount:
          type: number
        balanceDueDate:
          type: string
        paymentMethod:
          type: string
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/BookingLineItemInput"

    BookingUpdate:
      type: object
      properties:
        eventType:
          type: string
        location:
          type: string
        locationDetail:
          type: ["string", "null"]
        firstServiceDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        retainerAmount:
          type: number
        retainerPaid:
          type: boolean
        balancePaid:
          type: boolean
        balanceDueDate:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: ["string", "null"]

    BookingDetail:
      type: object
      required: [id, clientId, clientName, eventType, location, status, grandTotal, retainerAmount, retainerPaid, balancePaid, createdAt, events, payments, lineItems, activity]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        clientEmail:
          type: ["string", "null"]
        clientPhone:
          type: ["string", "null"]
        eventType:
          type: string
        location:
          type: string
        locationDetail:
          type: ["string", "null"]
        firstServiceDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        grandTotal:
          type: number
        retainerAmount:
          type: number
        retainerPaid:
          type: boolean
        balancePaid:
          type: boolean
        balanceDueDate:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        earlyMorningFee:
          type: number
        travelFee:
          type: number
        notes:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/BookingEvent"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/BookingLineItem"
        activity:
          type: array
          items:
            $ref: "#/components/schemas/BookingActivity"

    BookingActivity:
      type: object
      required: [id, bookingId, action, title, description, createdAt]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        action:
          type: string
        title:
          type: string
        description:
          type: string
        metadata:
          type: ["string", "null"]
        createdAt:
          type: string

    # ── Event ───────────────────────────────────────────────────────────────

    BookingLineItem:
      type: object
      required: [id, bookingId, name, kind, quantity, unitPrice, unitLabel, sortOrder, total]
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        eventId:
          type: ["integer", "null"]
        serviceItemId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        kind:
          type: string
          enum: [service, fee]
        quantity:
          type: number
        unitPrice:
          type: number
        unitLabel:
          type: string
        calculationNote:
          type: ["string", "null"]
        sortOrder:
          type: integer
        total:
          type: number

    BookingLineItemInput:
      type: object
      required: [name, kind, quantity, unitPrice, unitLabel]
